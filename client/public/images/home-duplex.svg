      <stop offset="0%" stop-color="#ffe7d6"/>
      <stop offset="100%" stop-color="#ffd0b8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <rect x="0" y="560" width="1200" height="240" fill="#d89174"/>
  <rect x="220" y="280" width="760" height="300" rx="16" fill="#f9ede7" stroke="#cb7f63" stroke-width="6"/>
  <polygon points="180,300 600,120 1020,300" fill="#c95f45"/>
  <rect x="300" y="340" width="140" height="190" rx="10" fill="#a24a35"/>
  <rect x="490" y="340" width="220" height="120" rx="10" fill="#b9def4"/>
  <rect x="760" y="340" width="140" height="190" rx="10" fill="#a24a35"/>
